publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.10.0

dependencies:
  cloud_firestore: ^6.5.0
  excel: ^4.0.6
  firebase_auth: ^6.5.2
  firebase_core: ^4.10.0
  flutter:
    sdk: flutter
